name: monie
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # Dependency injection
  get_it: ^8.0.3

  # Supabase (replacing Firebase)
  supabase_flutter: ^2.3.4
  flutter_dotenv: ^5.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^15.1.1

  # Functional programming
  dartz: ^0.10.1

  # Value equality
  equatable: ^2.0.5

  # Network
  internet_connection_checker: ^3.0.1
  http: ^1.2.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
